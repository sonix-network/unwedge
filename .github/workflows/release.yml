name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds per-arch prebuilt tarballs (incl. the big-endian mips64 controller
# build) and attaches them to a GitHub Release, which the openwrt-packages feed
# consumes.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to build (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Resolve version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          [ -z "$v" ] && v="${GITHUB_REF_NAME}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build release tarballs
        run: make dist VERSION=${{ steps.ver.outputs.version }}

      - name: Show checksums
        run: cat bin/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            bin/unwedge-*-linux-*.tar.gz
            bin/SHA256SUMS
